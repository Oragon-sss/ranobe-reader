<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интерактивная карта</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-shell">
  <main class="map-page">
    <header class="map-top">
      <a class="top-link" href="index.html">← Главное меню</a>
      <div class="map-controls" aria-label="Управление картой">
        <button type="button" id="zoomOut">−</button>
        <button type="button" id="resetMap">Сброс</button>
        <button type="button" id="zoomIn">+</button>
      </div>
    </header>

    <section class="map-stage" id="mapStage" aria-label="Интерактивная карта мира">
      <img class="world-map" id="worldMap" src="images/world-map.svg" alt="Карта мира ранобэ" draggable="false">
    </section>

    <p class="map-hint">Колесо мыши — масштаб. Зажми и тащи карту мышкой, чтобы передвигаться.</p>
  </main>

  <script>
    const stage = document.getElementById('mapStage');
    const map = document.getElementById('worldMap');
    const zoomIn = document.getElementById('zoomIn');
    const zoomOut = document.getElementById('zoomOut');
    const resetMap = document.getElementById('resetMap');

    let scale = 1;
    let x = 0;
    let y = 0;
    let dragging = false;
    let startX = 0;
    let startY = 0;

    function applyTransform() {
      map.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${scale})`;
    }

    function setScale(nextScale) {
      scale = Math.min(3, Math.max(0.7, nextScale));
      applyTransform();
    }

    function resetView() {
      scale = 1;
      x = 0;
      y = 0;
      applyTransform();
    }

    stage.addEventListener('wheel', (event) => {
      event.preventDefault();
      const direction = event.deltaY > 0 ? -0.12 : 0.12;
      setScale(scale + direction);
    }, { passive: false });

    stage.addEventListener('pointerdown', (event) => {
      dragging = true;
      stage.setPointerCapture(event.pointerId);
      startX = event.clientX - x;
      startY = event.clientY - y;
      stage.classList.add('dragging');
    });

    stage.addEventListener('pointermove', (event) => {
      if (!dragging) return;
      x = event.clientX - startX;
      y = event.clientY - startY;
      applyTransform();
    });

    stage.addEventListener('pointerup', () => {
      dragging = false;
      stage.classList.remove('dragging');
    });

    stage.addEventListener('pointercancel', () => {
      dragging = false;
      stage.classList.remove('dragging');
    });

    zoomIn.addEventListener('click', () => setScale(scale + 0.2));
    zoomOut.addEventListener('click', () => setScale(scale - 0.2));
    resetMap.addEventListener('click', resetView);

    applyTransform();
  </script>
</body>
</html>
