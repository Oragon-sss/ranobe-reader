<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Иллюстрации</title>
  <script src="theme.js"></script>
  <script src="image-viewer.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-shell">
  <main class="page">
    <a class="top-link" href="index.html">← Главное меню</a>

    <section class="panel">
      <p class="eyebrow centered">Галерея</p>
      <h1 class="page-title">Иллюстрации</h1>
      <p class="subtitle centered">Арты, которые поддерживают ощущение ранобэ и помогают миру запоминаться.</p>

      <div class="gallery-grid">
        <figure class="art-card featured">
          <img src="images/cover.png" alt="Обложка книги" data-lightbox-image>
          <figcaption>Обложка</figcaption>
        </figure>

        <figure class="art-card">
          <img src="images/village.png" alt="Деревня на холме" data-lightbox-image>
          <figcaption>Деревня на холме</figcaption>
        </figure>
      </div>
    </section>
  </main>
</body>
</html>
