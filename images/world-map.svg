<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Черновая карта фэнтези мира">
  <defs>
    <radialGradient id="paper" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#ead9b6"/>
      <stop offset="0.62" stop-color="#d4b784"/>
      <stop offset="1" stop-color="#9e7447"/>
    </radialGradient>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="4" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <style>
      .land{fill:#b9925d;stroke:#5f3b22;stroke-width:5}
      .isle{fill:#c6a16d;stroke:#5f3b22;stroke-width:4}
      .mount{fill:#5a3b28;stroke:#2d1b12;stroke-width:3}
      .forest{fill:#42613d;stroke:#26381f;stroke-width:2}
      .river{fill:none;stroke:#527c91;stroke-width:8;stroke-linecap:round}
      .road{fill:none;stroke:#7f5632;stroke-width:5;stroke-dasharray:14 14;stroke-linecap:round}
      .label{font:700 34px Georgia,serif;fill:#372217}
      .small{font:700 24px Georgia,serif;fill:#4b3020}
      .mark{fill:#7d2f1d;stroke:#f0d5a0;stroke-width:4}
    </style>
  </defs>
